
services:
  app:
    build:
      context: ./noctua-api
      dockerfile: ../Dockerfile
    container_name: noctua-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./noctua-api:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=noctua
      - DB_USERNAME=noctua
      - DB_PASSWORD=noctua_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    networks:
      - noctua-network

  db:
    image: postgres:17-alpine
    container_name: noctua-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: noctua
      POSTGRES_USER: noctua
      POSTGRES_PASSWORD: noctua_secret
    volumes:
      - noctua-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noctua"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - noctua-network

  redis:
    image: redis:7-alpine
    container_name: noctua-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - noctua-network

  horizon:
    build:
      context: ./noctua-api
      dockerfile: ../Dockerfile
    container_name: noctua-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./noctua-api:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=noctua
      - DB_USERNAME=noctua
      - DB_PASSWORD=noctua_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    networks:
      - noctua-network

volumes:
  noctua-db-data:

networks:
  noctua-network:
    driver: bridge